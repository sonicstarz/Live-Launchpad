<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Launchpad — Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Chivo:wght@300;400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ===== SPACE AGE — shared site styles ===== */
:root{
  --bg:#070a10; --bg2:#0d121c; --panel:#111827; --panel2:#161f30;
  --line:#1e2738; --line2:#2a3650;
  --txt:#e9eef6; --txt2:#8b9bb4; --txt3:#586780;
  --amber:#ffb627; --green:#3ddc84; --teal:#2dd4bf; --blue:#4d9fff;
  --purple:#a78bfa; --red:#ff5d5d; --coral:#ff8a5b; --pink:#f472b6;
  --mono:'Space Mono',monospace; --sans:'Chivo',sans-serif;
}
:root[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#ffffff; --panel:#ffffff; --panel2:#f0f3f9;
  --line:#dce3ef; --line2:#c4cfe0;
  --txt:#0f1726; --txt2:#48566e; --txt3:#7a89a3;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--txt); font-family:var(--sans); font-weight:300;
  line-height:1.6; overflow-x:hidden; min-height:100vh;
  background-image:
    radial-gradient(circle at 12% 6%, rgba(77,159,255,0.07), transparent 35%),
    radial-gradient(circle at 88% 22%, rgba(255,182,39,0.05), transparent 42%),
    radial-gradient(circle at 50% 92%, rgba(45,212,191,0.04), transparent 45%);
  background-attachment:fixed; transition:background-color .3s,color .3s;
}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
:root[data-theme="light"] #stars{opacity:.12}
.star{position:absolute;background:var(--txt);border-radius:50%;animation:tw ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.85}}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 24px}
.nav{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:24px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt);font-weight:700;font-size:16px;letter-spacing:-.01em;white-space:nowrap}
.brand .logo{width:26px;height:26px;display:grid;place-items:center;font-size:16px}
.brand .blink{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.nav-links{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.nav-links a{color:var(--txt2);text-decoration:none;font-size:13px;font-family:var(--mono);padding:7px 12px;border-radius:7px;transition:all .15s;letter-spacing:.02em}
.nav-links a:hover{color:var(--txt);background:var(--panel2)}
.nav-links a.active{color:var(--amber);background:rgba(255,182,39,.1)}
.theme-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:all .15s}
.theme-btn:hover{color:var(--amber);border-color:var(--amber)}
.nav-toggle{display:none;background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:18px;place-items:center;transition:all .15s}
.nav-toggle:hover{color:var(--amber);border-color:var(--amber)}
@media(max-width:860px){
  .nav-toggle{display:grid}
  .nav-inner{position:relative}
  .brand{margin-right:auto}
  .nav-links{display:none;position:absolute;top:calc(100% + 10px);left:0;right:0;flex:none;flex-direction:column;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:0 16px 40px rgba(0,0,0,.45);z-index:60}
  .nav-links.open{display:flex}
  .nav-links a{padding:11px 14px;border-radius:8px;font-size:14px}
}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--amber);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.eyebrow::before{content:"";width:32px;height:1px;background:var(--amber)}
h1{font-weight:900;font-size:clamp(30px,5vw,52px);line-height:.98;letter-spacing:-.025em}
.gt{background:linear-gradient(100deg,var(--amber),var(--coral) 45%,var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--txt2);font-size:clamp(15px,2vw,18px);line-height:1.5;max-width:680px;margin-top:16px;font-weight:300}
footer{border-top:1px solid var(--line);margin-top:60px;padding:30px 0 60px;font-size:12px;color:var(--txt3);font-weight:300}
footer b{color:var(--txt2);font-weight:400}
footer a{color:var(--txt2);text-decoration:none}
footer a:hover{color:var(--amber)}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--amber);color:#1a1205;font-family:var(--mono);font-weight:700;font-size:13px;padding:11px 20px;border-radius:9px;text-decoration:none;border:none;cursor:pointer;transition:transform .15s;text-transform:uppercase;letter-spacing:.05em}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt2)}
.btn.ghost:hover{color:var(--amber);border-color:var(--amber)}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}

/* ===== studio ===== */
.studio-head{padding:36px 0 4px}
.studio-msg{font-family:var(--mono);font-size:13px;min-height:18px;margin:18px 0 6px}
.mode-tabs{display:inline-flex;gap:4px;margin:14px 0 2px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:4px}
.mtab{background:none;border:none;color:var(--txt2);font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:7px;cursor:pointer}
.mtab:hover{color:var(--txt)}
.mtab.on{background:var(--amber);color:#1a1205;font-weight:700}
.crumb{font-family:var(--mono);font-size:12px;color:var(--txt3);margin:22px 0 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.crumb a{color:var(--txt2);cursor:pointer;text-decoration:none}
.crumb a:hover{color:var(--amber)}
.crumb .sep{color:var(--line2)}
.crumb .cur{color:var(--amber)}
.addbar{margin:4px 0 20px}
.empty{color:var(--txt3);font-family:var(--mono);font-size:13px;padding:18px 0}
.row{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.row .thumb{width:104px;height:58px;border-radius:6px;object-fit:cover;flex:none;background:#0a0f18;border:1px solid var(--line)}
.row .info{flex:1;min-width:0}
.row .info h4{font-size:15px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .info .count{font-family:var(--mono);font-size:11px;color:var(--txt3);margin-top:2px}
.row .acts{display:flex;gap:6px;flex:none;flex-wrap:wrap;justify-content:flex-end}
.iconbtn{background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);border-radius:7px;min-width:32px;height:32px;cursor:pointer;font-size:13px;display:grid;place-items:center;padding:0 8px}
.iconbtn:hover{color:var(--amber);border-color:var(--amber)}
.iconbtn:disabled{opacity:.35;cursor:default}
.iconbtn.open{font-family:var(--mono);font-size:12px;padding:0 12px}
.iconbtn.danger:hover{color:var(--red);border-color:var(--red)}
/* modal */
.modal{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal-box{background:var(--panel2);border:1px solid var(--line2);border-radius:16px;padding:24px;max-width:460px;width:100%}
.modal-box h3{font-family:var(--mono);font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin-bottom:6px}
.field input,.field textarea{width:100%;background:#0a0f18;border:1px solid var(--line2);border-radius:9px;color:var(--txt);font-family:var(--sans);font-size:14px;padding:10px 12px;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--amber)}
.field textarea{min-height:70px;resize:vertical}
.modal-thumb{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.modal-thumb img{width:120px;height:68px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex:none}
.modal-thumb .t{font-family:var(--mono);font-size:12px;color:var(--txt2);line-height:1.4}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
</style>
<style>
/* ===== BACKEND CONSOLE — technical theme (overrides the shared styles above) ===== */
:root{
  --bg:#0a0d13; --bg2:#0e131b; --panel:#10151f; --panel2:#151c28;
  --line:#1d2533; --line2:#2a3547;
  --txt:#e6edf3; --txt2:#8a97a8; --txt3:#586677;
  --amber:#35e0d0;                 /* recolor the inherited accent → technical cyan */
  --accent:#35e0d0; --accent2:#7aa2ff; --ok:#3ddc84; --danger:#ff6b6b;
}
body{
  font-family:var(--sans); font-weight:400; color:var(--txt); background:var(--bg);
  background-image:linear-gradient(rgba(123,162,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(123,162,255,.045) 1px,transparent 1px);
  background-size:38px 38px; background-attachment:fixed; min-height:100vh;
}
#stars{display:none}
/* shell */
.console{display:flex;min-height:100vh}
.sidebar{width:250px;flex:none;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:14px;letter-spacing:.1em;color:var(--txt);padding:18px 16px 14px;border-bottom:1px solid var(--line)}
.side-brand b{color:var(--accent);font-weight:700}
.side-brand .env{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt3);border:1px solid var(--line2);border-radius:5px;padding:2px 7px}
.side-scroll{flex:1;overflow-y:auto;padding:8px 8px 14px}
.side-group{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);padding:16px 10px 6px}
.side-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;border-left:2px solid transparent;color:var(--txt2);font-family:var(--sans);font-size:14px;font-weight:500;padding:10px 12px;border-radius:0 8px 8px 0;cursor:pointer;flex-wrap:wrap;transition:all .12s}
.side-item .ic{font-size:15px;width:18px;text-align:center}
.side-item .hint{flex-basis:100%;padding-left:28px;font-family:var(--mono);font-size:10px;color:var(--txt3);font-weight:400;margin-top:2px}
.side-item:hover{color:var(--txt);background:var(--panel2)}
.side-item.on{color:var(--accent);background:rgba(53,224,208,.09);border-left-color:var(--accent)}
.side-foot{border-top:1px solid var(--line);padding:14px 16px;font-family:var(--mono);font-size:11px}
.who{color:var(--txt2);margin-bottom:9px;word-break:break-all}
.side-link{color:var(--txt3);text-decoration:none}
.side-link:hover{color:var(--accent)}
.side-toggle{display:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh}
.topbar{flex:none;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(8px)}
.tb-title{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt)}
.tb-status{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--txt3)}
.tb-status .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok)}
.main-scroll{flex:1;overflow-y:auto;padding:22px 26px 70px}
/* console list tweaks */
.row{border-radius:9px;padding:11px 13px;margin-bottom:8px}
.row .info h4{font-weight:600;font-size:14px}
.empty{border:1px dashed var(--line2);border-radius:10px;padding:18px}
.addbar{display:flex;gap:8px;flex-wrap:wrap}
.btn{color:#04211e}
.btn.ghost{color:var(--txt2)}
/* settings */
.set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.set-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
.set-card h4{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.kv{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--txt3);font-family:var(--mono);font-size:12px}
.kv .v{color:var(--txt);text-align:right;word-break:break-word}
.badge{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:5px;background:rgba(53,224,208,.14);color:var(--accent)}
.set-note{font-size:12.5px;color:var(--txt2);line-height:1.6}
.set-card ul{margin:8px 0 0;padding-left:18px;color:var(--txt2);font-size:13px;line-height:1.7}
.set-card code{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--bg2);padding:1px 5px;border-radius:4px}
body.compact .row{padding:7px 11px;margin-bottom:6px}
body.compact .row .thumb{width:84px;height:47px}
@media(max-width:820px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;height:100vh;z-index:80;transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.5)}
  .console.side-open .sidebar{transform:none}
  .side-toggle{display:grid;position:fixed;top:9px;left:10px;z-index:90;width:40px;height:40px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);color:var(--txt);place-items:center;cursor:pointer;font-size:18px}
  .topbar{padding-left:62px}
  .main-scroll{padding:18px 16px 70px}
}
</style>
</head>
<body>
<div id="ll-gate-content" class="console" hidden>
  <button class="side-toggle" id="sideToggle" aria-label="Open menu">☰</button>
  <aside class="sidebar" id="sidebar">
    <div class="side-brand">◢ <b>STUDIO</b><span class="env">console</span></div>
    <div class="side-scroll">
      <div class="side-group">Content</div>
      <button class="side-item on" data-view="learning"><span class="ic">📚</span> Learning Center<span class="hint">libraries · courses · videos</span></button>
      <button class="side-item" data-view="rockets"><span class="ic">🚀</span> Rocket Explorer<span class="hint">rockets · parts · videos</span></button>
      <button class="side-item" data-view="channels"><span class="ic">🎬</span> Videos<span class="hint">curated YouTube channels</span></button>
      <div class="side-group">System</div>
      <button class="side-item" data-view="settings"><span class="ic">⚙</span> Settings<span class="hint">session · backend · appearance</span></button>
    </div>
    <div class="side-foot">
      <div class="who" id="who">—</div>
      <a class="side-link" href="index.html" target="_blank" rel="noopener">↗ View live site</a>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="tb-title" id="tbTitle">Learning Center</div>
      <div class="tb-status"><span class="dot"></span> connected · supabase</div>
    </header>
    <div class="main-scroll">
      <div id="lessons-wrap" class="view">
        <div class="studio-msg" id="studio-msg"></div>
        <div id="studio"></div>
      </div>
      <div id="rocket-wrap" class="view" hidden>
        <div class="studio-msg" id="rk-msg"></div>
        <div id="rk-host"></div>
      </div>
      <div id="channels-wrap" class="view" hidden>
        <div class="studio-msg" id="chan-msg"></div>
        <div id="chan-host"></div>
      </div>
      <div id="settings-wrap" class="view" hidden></div>
    </div>
  </main>

  <div class="modal" id="modal"><div class="modal-box" id="modal-box"></div></div>
</div>

<script>
/* ===== CONTENT STUDIO APP ===== */
var Studio = (function(){
  var sb, host, msg;
  var state = { lib:null, course:null, level:'lib', list:[] };
  var TABLE = { lib:'libraries', course:'courses', video:'videos' };

  function esc(s){return String(s==null?'':s).replace(/[<>&"]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]);});}
  function toast(t,err){ msg.style.color=err?'#ff5d5d':'var(--green)'; msg.textContent=t||''; if(t){var cur=t;setTimeout(function(){if(msg.textContent===cur)msg.textContent='';},3000);} }
  function parseYouTube(url){
    if(!url) return '';
    url=String(url).trim();
    if(/^[\w-]{11}$/.test(url)) return url;
    var m;
    m=url.match(/[?&]v=([\w-]{11})/); if(m) return m[1];
    m=url.match(/youtu\.be\/([\w-]{11})/); if(m) return m[1];
    m=url.match(/\/embed\/([\w-]{11})/); if(m) return m[1];
    m=url.match(/\/shorts\/([\w-]{11})/); if(m) return m[1];
    return '';
  }
  function ytThumb(id){ return 'https://img.youtube.com/vi/'+id+'/mqdefault.jpg'; }
  function ytMeta(id){
    return fetch('https://www.youtube.com/oembed?format=json&url=https://www.youtube.com/watch?v='+id)
      .then(function(r){ return r.ok?r.json():null; }).then(function(j){ return j?j.title:''; }).catch(function(){ return ''; });
  }

  async function fetchList(table, fk, fkVal){
    var q=sb.from(table).select('*');
    if(fk) q=q.eq(fk,fkVal);
    var res=await q.order('sort_order',{ascending:true}).order('created_at',{ascending:true});
    if(res.error){ toast('Load failed: '+res.error.message,true); return []; }
    return res.data||[];
  }
  async function countChildren(table, fk, fkVal){
    var res=await sb.from(table).select('*',{count:'exact',head:true}).eq(fk,fkVal);
    return res.count||0;
  }

  function rowHTML(item,i,total,opts){
    opts=opts||{};
    var thumb=opts.thumb?'<img class="thumb" src="'+opts.thumb+'" alt="" loading="lazy">':'';
    var sub=opts.sub!=null?'<div class="count">'+esc(opts.sub)+'</div>':'';
    var open=opts.open?'<button class="iconbtn open" data-act="open">Open ›</button>':'';
    return '<div class="row" data-i="'+i+'">'+thumb
      +'<div class="info"><h4>'+esc(item.title)+'</h4>'+sub+'</div>'
      +'<div class="acts">'
      +'<button class="iconbtn" data-act="up"'+(i===0?' disabled':'')+' title="Move up">▲</button>'
      +'<button class="iconbtn" data-act="down"'+(i===total-1?' disabled':'')+' title="Move down">▼</button>'
      +'<button class="iconbtn" data-act="edit" title="Edit">✎</button>'
      +'<button class="iconbtn danger" data-act="del" title="Delete">🗑</button>'
      +open+'</div></div>';
  }
  function wireRows(level,list){
    host.querySelectorAll('.row').forEach(function(r){
      var item=list[+r.dataset.i], i=+r.dataset.i;
      r.querySelectorAll('[data-act]').forEach(function(b){
        b.onclick=function(){
          var a=b.dataset.act;
          if(a==='open') openItem(level,item);
          else if(a==='edit') openEditor(level,item);
          else if(a==='del') delItem(level,item);
          else if(a==='up') reorder(level,list,i,i-1);
          else if(a==='down') reorder(level,list,i,i+1);
        };
      });
    });
    host.querySelectorAll('[data-nav]').forEach(function(a){
      a.onclick=function(){ var n=a.dataset.nav; if(n==='lib')renderLib(); else if(n==='course')renderCourse(); };
    });
  }

  async function renderLib(){
    state.level='lib'; state.lib=null; state.course=null;
    var libs=await fetchList('libraries');
    var counts=await Promise.all(libs.map(function(L){return countChildren('courses','library_id',L.id);}));
    state.list=libs;
    var h='<div class="crumb"><span class="cur">Libraries</span></div>';
    h+='<div class="addbar"><button class="btn" id="add">+ New library</button></div>';
    if(!libs.length) h+='<div class="empty">No libraries yet — create your first one.</div>';
    libs.forEach(function(L,i){ h+=rowHTML(L,i,libs.length,{sub:counts[i]+' course'+(counts[i]===1?'':'s'),open:true}); });
    host.innerHTML=h;
    document.getElementById('add').onclick=function(){ openEditor('lib',null); };
    wireRows('lib',libs);
  }
  async function renderCourse(){
    state.level='course'; state.course=null;
    var courses=await fetchList('courses','library_id',state.lib.id);

  function namesFrom(j){ var s={}; (j.nodes||[]).forEach(function(n){if(n&&n.name)s[n.name]=1;}); (j.meshes||[]).forEach(function(m){if(m&&m.name)s[m.name]=1;}); return Object.keys(s); }
  async function glbNodeNames(url){
    try{
      var buf=await (await fetch(url)).arrayBuffer(), dv=new DataView(buf);
      if(dv.byteLength>=12 && dv.getUint32(0,true)===0x46546C67){ // .glb (binary glTF)
        var len=dv.getUint32(8,true), off=12, jsonStr=null;
        while(off+8<=len){ var clen=dv.getUint32(off,true), ctype=dv.getUint32(off+4,true), cstart=off+8;
          if(ctype===0x4E4F534A){ jsonStr=new TextDecoder().decode(new Uint8Array(buf,cstart,clen)); break; }
          off=cstart+clen; }
        return jsonStr? namesFrom(JSON.parse(jsonStr)) : [];
      }
      return namesFrom(JSON.parse(new TextDecoder().decode(buf))); // plain .gltf
    }catch(e){ return []; }
  }
  async function aiDraft(){
    var btn=el('rk-ai'); if(btn){ btn.disabled=true; btn.textContent='✨ Thinking…'; }
    try{
      var sess=await sb.auth.getSession();
      var token=sess&&sess.data&&sess.data.session&&sess.data.session.access_token;
      if(!token){ toast('Session expired — reload and sign in.',true); return; }
      var nodeNames=[];
      if(rocket.model_kind==='glb' && rocket.model_url){ toast('Reading model parts…'); nodeNames=await glbNodeNames(rocket.model_url); }
      var existingParts=(list||[]).map(function(p){ return {mesh_key:p.mesh_key,name:p.name}; });
      var resp=await fetch('/.netlify/functions/rocket-assist',{ method:'POST', headers:{'content-type':'application/json',Authorization:'Bearer '+token},
        body:JSON.stringify({rocketName:rocket.name,operator:rocket.operator,subtitle:rocket.subtitle,height_m:rocket.height_m,nodeNames:nodeNames,existingParts:existingParts}) });
      var out=await resp.json().catch(function(){return {};});
      if(!resp.ok){ toast('AI: '+(out.error||('error '+resp.status)),true); return; }
      if(!out.parts||!out.parts.length){ toast('No parts proposed — try again.',true); return; }
      aiReview(out.parts);
    }catch(e){ toast('AI request failed: '+e.message,true); }
    finally{ if(btn){ btn.disabled=false; btn.textContent='✨ AI draft parts'; } }
  }
  function aiReview(parts){
    var head='<h3>✨ AI draft — review before saving</h3><p style="color:var(--txt3);font-size:13px;margin:-6px 0 12px">Edit anything, untick parts you don’t want, and verify the sources. Saving is your sign-off — matching mesh keys update existing parts, new ones are added.</p>';
    var cards='<div id="ai-list" style="max-height:46vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px">';
    parts.forEach(function(p){
      var specs=(p.specs||[]).map(function(s){return s[0]+': '+s[1];}).join('\n');
      var src=(p.sources||[]).map(function(u){return '<a href="'+esc(u)+'" target="_blank" rel="noopener" style="color:#6da8ff;font-size:11px;word-break:break-all">'+esc(u)+'</a>';}).join('<br>');
      cards+='<div class="ai-card" style="border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px;background:rgba(255,255,255,.03)">'
        +'<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" class="ai-on" checked>'
        +'<input class="ai-num" value="'+esc(p.part_number)+'" style="width:48px"><input class="ai-name" value="'+esc(p.name)+'" style="flex:1;font-weight:700"></label>'
        +'<div style="display:flex;gap:8px;align-items:center;margin-top:8px"><span style="font-size:11px;color:var(--txt3)">mesh key</span><input class="ai-mesh" value="'+esc(p.mesh_key)+'" style="flex:1"></div>'
        +'<textarea class="ai-what" placeholder="What it is" style="width:100%;margin-top:8px;min-height:50px">'+esc(p.what_it_is)+'</textarea>'
        +'<textarea class="ai-how" placeholder="How it works" style="width:100%;margin-top:6px;min-height:64px">'+esc(p.how_it_works)+'</textarea>'
        +'<textarea class="ai-specs" placeholder="Label: value (one per line)" style="width:100%;margin-top:6px;min-height:48px">'+esc(specs)+'</textarea>'
        +(src?'<div style="margin-top:6px;font-size:11px;color:var(--txt3)">Sources:<br>'+src+'</div>':'<div style="margin-top:6px;font-size:11px;color:#ff8a5b">⚠ No source provided — verify before saving.</div>')
        +'</div>';
    });
    cards+='</div>';
    el('modal-box').innerHTML=head+cards+'<div class="modal-acts"><button class="btn ghost" id="ai-cancel">Cancel</button><button class="btn" id="ai-apply">Apply selected</button></div>';
    modal().classList.add('open'); el('ai-cancel').onclick=closeModal; el('ai-apply').onclick=aiApply;
  }
  async function aiApply(){
    var cards=document.querySelectorAll('#ai-list .ai-card'), existing={};
    (list||[]).forEach(function(p){ existing[p.mesh_key]=p; });
    var ops=[], ord=(list||[]).length, n=0;
    cards.forEach(function(card){
      if(!card.querySelector('.ai-on').checked) return;
      var g=function(c){ var e=card.querySelector('.'+c); return e?e.value.trim():''; };
      var mesh=g('ai-mesh'), name=g('ai-name'); if(!mesh||!name) return;
      var specs=g('ai-specs').split('\n').map(function(l){var ix=l.indexOf(':');return ix<0?null:[l.slice(0,ix).trim(),l.slice(ix+1).trim()];}).filter(function(x){return x&&x[0];});
      var rec={part_number:g('ai-num'),name:name,mesh_key:mesh,what_it_is:g('ai-what'),how_it_works:g('ai-how'),specs:specs};
      if(existing[mesh]) ops.push(sb.from('rocket_parts').update(rec).eq('id',existing[mesh].id));
      else { rec.rocket_id=rocket.id; rec.display_order=ord++; ops.push(sb.from('rocket_parts').insert(rec)); }
      n++;
    });
    if(!ops.length){ toast('Nothing selected',true); return; }
    el('ai-apply').disabled=true;
    var res=await Promise.all(ops), err=res.find(function(r){return r.error;});
    if(err){ toast('Save failed: '+err.error.message,true); el('ai-apply').disabled=false; return; }
    closeModal(); renderParts(); toast('Saved '+n+' part(s)');
  }

  function init(){ if(inited)return; inited=true; sb=window.LLAuth&&window.LLAuth.sb; host=el('rk-host'); msg=el('rk-msg'); if(!sb){toast('Not signed in',true);return;} renderRockets(); }
  return { init:init };
})();

/* ===== VIDEO CHANNELS EDITOR (News → Videos feed) ===== */
var VideoChannels = (function(){
  var sb, host, msg, inited=false, list=[];
  function el(id){return document.getElementById(id);}
  function esc(s){return String(s==null?'':s).replace(/[<>&"]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]);});}
  function toast(t,err){ if(!msg)return; msg.style.color=err?'#ff5d5d':'var(--accent)'; msg.textContent=t||''; if(t){var c=t;setTimeout(function(){if(msg.textContent===c)msg.textContent='';},3000);} }
  function modal(){return el('modal');} function closeModal(){modal().classList.remove('open');}

  async function load(){
    var r=await sb.from('video_channels').select('*').order('sort_order',{ascending:true});
    if(r.error){ toast('Load failed: '+r.error.message+(/relation|table/i.test(r.error.message)?' — run video-channels.sql':''),true); list=[]; } else list=r.data||[];
    render();
  }
  function render(){
    var h='<div class="crumb"><span class="cur">Video channels</span></div>';
    h+='<div class="addbar"><button class="btn" id="ch-add">+ Add channel</button></div>';
    h+='<div style="font-family:var(--mono);font-size:12px;color:var(--txt3);margin-bottom:14px;line-height:1.6">These feed the public <b>News → Videos</b> page. Disabled channels are skipped. Optional keywords (CSV) keep only matching titles — useful for broader channels.</div>';
    if(!list.length) h+='<div class="empty">No channels yet — add one, or run <code>video-channels.sql</code> to seed the defaults.</div>';
    list.forEach(function(c,i){
      h+='<div class="row" data-i="'+i+'"><div class="info"><h4>'+esc(c.name)+(c.enabled?'':' <span style="color:var(--txt3)">· off</span>')+'</h4><div class="count">'+esc(c.channel_id)+(c.keywords?(' · kw: '+esc(c.keywords)):'')+'</div></div>'
        +'<div class="acts">'
        +'<button class="iconbtn" data-act="up"'+(i===0?' disabled':'')+'>▲</button>'
        +'<button class="iconbtn" data-act="down"'+(i===list.length-1?' disabled':'')+'>▼</button>'
        +'<button class="iconbtn" data-act="toggle" title="Enable / disable">'+(c.enabled?'⏸':'▶')+'</button>'
        +'<button class="iconbtn" data-act="edit" title="Edit">✎</button>'
        +'<button class="iconbtn danger" data-act="del" title="Remove">🗑</button>'
        +'</div></div>';
    });
    host.innerHTML=h;
    el('ch-add').onclick=function(){ editor(null); };
    host.querySelectorAll('.row').forEach(function(rw){ var i=+rw.dataset.i, c=list[i];
      rw.querySelectorAll('[data-act]').forEach(function(b){ b.onclick=function(){ var a=b.dataset.act;
        if(a==='edit')editor(c); else if(a==='del')del(c); else if(a==='toggle')toggle(c); else if(a==='up')reorder(i,i-1); else if(a==='down')reorder(i,i+1); }; }); });
  }
  function editor(item){
    el('modal-box').innerHTML='<h3>'+(item?'Edit ':'Add ')+'channel</h3>'
      +(item?'':'<div class="field"><label>Paste @handle or channel URL</label><div style="display:flex;gap:8px"><input id="ch-q" placeholder="@scottmanley or a youtube.com/@… URL" style="flex:1"><button class="btn ghost" id="ch-resolve" type="button">Resolve</button></div><div id="ch-rmsg" style="font-family:var(--mono);font-size:11px;color:var(--txt3);margin-top:6px;min-height:14px"></div></div>')
      +'<div class="field"><label>Name</label><input id="ch-name" value="'+esc(item?item.name:'')+'"></div>'
      +'<div class="field"><label>Channel ID <span style="text-transform:none;color:var(--txt3)">(UC…)</span></label><input id="ch-id" value="'+esc(item?item.channel_id:'')+'"'+(item?' readonly':'')+'></div>'
      +'<div class="field"><label>Keywords <span style="text-transform:none;color:var(--txt3)">(optional CSV)</span></label><input id="ch-kw" value="'+esc(item&&item.keywords?item.keywords:'')+'"></div>'
      +'<div class="field"><label style="text-transform:none"><input type="checkbox" id="ch-en" '+((!item||item.enabled)?'checked':'')+'> Enabled</label></div>'
      +'<div class="modal-acts"><button class="btn ghost" id="ch-cancel">Cancel</button><button class="btn" id="ch-save">Save</button></div>';
    modal().classList.add('open');
    el('ch-cancel').onclick=closeModal; el('ch-save').onclick=function(){ save(item); };
    var rb=el('ch-resolve'); if(rb) rb.onclick=resolve;
  }
  async function resolve(){
    var q=el('ch-q').value.trim(), m=el('ch-rmsg'); if(!q)return;
    m.style.color='var(--txt3)'; m.textContent='Resolving…';
    try{
      var r=await fetch('/.netlify/functions/resolve-channel?q='+encodeURIComponent(q));
      var d=await r.json(); if(!r.ok||!d.channel_id) throw new Error(d.error||'not found');
      el('ch-id').value=d.channel_id; if(!el('ch-name').value) el('ch-name').value=d.name||'';
      m.style.color='var(--accent)'; m.textContent='✓ '+(d.name||d.channel_id);
    }catch(e){ m.style.color='#ff5d5d'; m.textContent='Couldn’t resolve — paste the full channel URL or its UC… id.'; }
  }
  async function save(item){
    var name=el('ch-name').value.trim(), id=el('ch-id').value.trim(), kw=el('ch-kw').value.trim(), en=el('ch-en').checked;
    if(!name||!/^UC[\w-]{22}$/.test(id)){ toast('Need a name and a valid UC… channel id',true); return; }
    var payload={name:name,channel_id:id,keywords:kw,enabled:en};
    el('ch-save').disabled=true; var r;
    if(item) r=await sb.from('video_channels').update(payload).eq('id',item.id);
    else { payload.sort_order=list.length; r=await sb.from('video_channels').insert(payload); }
    if(r.error){ toast('Save failed: '+r.error.message,true); el('ch-save').disabled=false; return; }
    closeModal(); load(); toast('Saved');
  }
  async function toggle(c){ var r=await sb.from('video_channels').update({enabled:!c.enabled}).eq('id',c.id); if(r.error){toast('Failed: '+r.error.message,true);return;} load(); }
  async function del(c){ if(!confirm('Remove “'+c.name+'” from the video feed?'))return; var r=await sb.from('video_channels').delete().eq('id',c.id); if(r.error){toast('Delete failed: '+r.error.message,true);return;} load(); toast('Removed'); }
  async function reorder(i,j){ if(j<0||j>=list.length)return; var a=list.slice(),t=a[i];a[i]=a[j];a[j]=t; var r=await Promise.all(a.map(function(it,idx){return sb.from('video_channels').update({sort_order:idx}).eq('id',it.id);})); var e=r.find(function(x){return x&&x.error;}); if(e){toast('Reorder failed',true);return;} load(); }
  function init(){ if(inited)return; inited=true; sb=window.LLAuth&&window.LLAuth.sb; host=el('chan-host'); msg=el('chan-msg'); if(!sb){toast('Not signed in',true);return;} load(); }
  return { init:init };
})();

(function(){
  function esc(s){return String(s==null?'':s).replace(/[<>&"]/g,function(c){return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]);});}
  try{ if(localStorage.getItem('ll-studio-density')==='compact') document.body.classList.add('compact'); }catch(e){}

  window.__studioView=function(v){

  var st=document.getElementById('sideToggle'); if(st) st.onclick=function(){ document.querySelector('.console').classList.toggle('side-open'); };

  function renderSettings(){

        +'<div class="kv"><span class="k">Platform</span><span class="v">Supabase</span></div>'

        +'<div class="kv"><span class="k">Editors write via</span><span class="v">RLS · is_editor()</span></div>'
        +'<div style="margin-top:14px"><a class="btn ghost" href="https://supabase.com/dashboard/project/oshizhnblnsrjutxyxxg" target="_blank" rel="noopener">Open Supabase ↗</a></div></div>'
      +'<div class="set-card"><h4>Appearance</h4>'
        +'<div class="set-note">List density in the editors.</div>'
        +'<div style="margin-top:12px;display:flex;gap:8px">'
          +'<button class="btn'+(dense?' ghost':'')+'" data-density="comfortable">Comfortable</button>'
          +'<button class="btn'+(dense?'':' ghost')+'" data-density="compact">Compact</button></div></div>'
      +'<div class="set-card"><h4>Setup checklist</h4>'
        +'<div class="set-note">One-time SQL to run in Supabase (also tracked in the “Owner setup” Notion card):</div>'
        +'<ul><li><code>subscribers.sql</code> — email signups</li><li><code>rocket-models-storage.sql</code> — .glb uploads</li></ul></div>'
      +'<div class="set-card"><h4>Content policy</h4>'
        +'<div class="set-note">Human-authored, or compiled from cited real sources and vetted before publish. AI may draft — never auto-publish.</div></div>'
      +'</div>';
    var w=document.getElementById('settings-wrap'); if(!w) return; w.innerHTML=html;
    var so=document.getElementById('set-signout'); if(so) so.onclick=function(){ if(a.sb){ so.disabled=true; a.sb.auth.signOut().then(function(){location.reload();}); } else location.reload(); };
    w.querySelectorAll('[data-density]').forEach(function(b){ b.onclick=function(){ var c=b.dataset.density==='compact'; document.body.classList.toggle('compact',c); try{localStorage.setItem('ll-studio-density',c?'compact':'comfortable');}catch(e){} renderSettings(); }; });
