<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Launchpad — In Development</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Chivo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#070a10;--bg2:#0d121c;--panel:#111827;--panel2:#161f30;--line:#1e2738;--line2:#2a3650;--txt:#e9eef6;--txt2:#8b9bb4;--txt3:#586780;--amber:#ffb627;--green:#3ddc84;--teal:#2dd4bf;--blue:#4d9fff;--purple:#a78bfa;--red:#ff5d5d;--coral:#ff8a5b;--pink:#f472b6;--mono:'Space Mono',monospace;--sans:'Chivo',sans-serif}
:root[data-theme="light"]{--bg:#f4f6fb;--bg2:#fff;--panel:#fff;--panel2:#f0f3f9;--line:#dce3ef;--line2:#c4cfe0;--txt:#0f1726;--txt2:#48566e;--txt3:#7a89a3}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-weight:300;line-height:1.6;overflow-x:hidden;min-height:100vh;background-image:radial-gradient(circle at 12% 6%,rgba(77,159,255,.07),transparent 35%),radial-gradient(circle at 88% 22%,rgba(255,182,39,.05),transparent 42%);background-attachment:fixed;transition:background-color .3s,color .3s}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
:root[data-theme="light"] #stars{opacity:.12}
.star{position:absolute;background:var(--txt);border-radius:50%;animation:tw ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.85}}
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 20px}
.nav{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt);font-weight:700;font-size:16px;white-space:nowrap;font-family:var(--sans)}
.brand .blink{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.nav-links{display:flex;gap:2px;flex:1;flex-wrap:wrap}
.nav-links a{color:var(--txt2);text-decoration:none;font-size:13px;font-family:var(--mono);padding:7px 11px;border-radius:7px;transition:all .15s}
.nav-links a:hover{color:var(--txt);background:var(--panel2)}
.nav-links a.active{color:var(--amber);background:rgba(255,182,39,.1)}
.theme-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:16px;display:grid;place-items:center;flex-shrink:0}
.theme-btn:hover{color:var(--amber);border-color:var(--amber)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--amber);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.eyebrow::before{content:"";width:32px;height:1px;background:var(--amber)}
h1{font-weight:900;font-size:clamp(32px,6vw,56px);line-height:1;letter-spacing:-.025em}
.gt{background:linear-gradient(100deg,var(--amber),var(--coral) 45%,var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--txt2);font-size:clamp(14px,2vw,18px);line-height:1.5;max-width:680px;margin-top:16px}
.section{margin:40px 0}
.dev-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.dev-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.dev-card::after{content:"";position:absolute;top:0;left:0;width:100%;height:2px;background:var(--accent);opacity:.7}
.dev-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.dev-ico{font-size:30px;line-height:1}
.dev-name{font-size:18px;font-weight:700;line-height:1.1}
.dev-org{font-family:var(--mono);font-size:11px;color:var(--txt3);margin-top:2px}
.dev-status{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:6px;font-weight:700;margin-bottom:10px}
.st-active{background:rgba(61,220,132,.15);color:var(--green)}
.st-testing{background:rgba(255,182,39,.15);color:var(--amber)}
.st-paused{background:rgba(255,93,93,.15);color:var(--red)}
.st-dev{background:rgba(77,159,255,.15);color:var(--blue)}
.dev-desc{font-size:13px;color:var(--txt2);line-height:1.55;margin-bottom:12px}
.dev-milestone{font-size:12px;color:var(--txt2);border-top:1px solid var(--line);padding-top:10px}
.dev-milestone b{color:var(--amber);font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:3px}
footer{border-top:1px solid var(--line);margin-top:50px;padding:28px 0 50px;font-size:12px;color:var(--txt3)}
footer a{color:var(--txt2);text-decoration:none}footer a:hover{color:var(--amber)}
@media(max-width:560px){.nav-inner{gap:10px}}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
</style>
</head>
<body>
<div id="stars"></div>
<div id="site-header"></div>
<div class="wrap">
  <section class="section" style="padding-top:40px">
    <div class="eyebrow">Build Status &middot; Active Programs</div>
    <h1>In <span class="gt">Development</span></h1>
    <p class="sub">The vehicles and programs being built right now across the industry &mdash; where each one stands and what milestone comes next. (Status as of mid-2026.)</p>
  </section>
  <section class="section">
    <div class="dev-grid" id="devGrid"></div>
  </section>
</div>
<div id="site-footer"></div>
<script>
const PROGRAMS=[
  {ico:"\uD83D\uDEF8",name:"Starship",org:"SpaceX",status:"testing",statusLabel:"Flight testing",accent:"var(--amber)",desc:"Fully reusable super-heavy launch system. The most powerful rocket ever built, central to both Starlink and NASA's Artemis lunar landings.",milestone:"FAA-mandated mishap investigation underway before the next flight can be cleared."},
  {ico:"\uD83C\uDF19",name:"Artemis",org:"NASA",status:"active",statusLabel:"Active",accent:"var(--green)",desc:"America's program to return humans to the Moon. Artemis II flew the first crewed lunar flyby in over 50 years in April 2026.",milestone:"Artemis III crew announced June 9, 2026; mission targeting mid-2027."},
  {ico:"\uD83D\uDD35",name:"New Glenn",org:"Blue Origin",status:"paused",statusLabel:"Pad rebuild",accent:"var(--red)",desc:"Heavy-lift rocket with a reusable first stage, designed to compete with Falcon Heavy and carry crew and cargo to orbit and beyond.",milestone:"Recovering from a launch-pad anomaly; next flight pending pad repairs."},
  {ico:"\u26AB",name:"Neutron",org:"Rocket Lab",status:"dev",statusLabel:"In development",accent:"var(--blue)",desc:"Medium-lift, reusable rocket aimed at constellation deployment and crewed missions. Rocket Lab's step up from the small Electron.",milestone:"Targeting first flight; pad and second-stage testing ongoing."},
  {ico:"\uD83D\uDFE3",name:"Vulcan Centaur",org:"ULA",status:"active",statusLabel:"Operational",accent:"var(--purple)",desc:"ULA's successor to the Atlas V and Delta IV, built to carry national-security payloads and commercial satellites.",milestone:"Working through booster anomaly fixes while flying operational missions."},
  {ico:"\uD83D\uDEF0\uFE0F",name:"Dream Chaser",org:"Sierra Space",status:"dev",statusLabel:"In development",accent:"var(--teal)",desc:"A reusable spaceplane designed to deliver cargo (and eventually crew) to the ISS, landing on a runway like the Space Shuttle.",milestone:"Preparing for its long-awaited maiden cargo flight to the ISS."},
  {ico:"\uD83C\uDF11",name:"Blue Moon",org:"Blue Origin",status:"dev",statusLabel:"In development",accent:"var(--blue)",desc:"Blue Origin's lunar lander, selected by NASA as one of two human landing systems for the Artemis program.",milestone:"Lander mockup ready for NASA Artemis astronaut training."},
  {ico:"\uD83D\uDE80",name:"Long March 10",org:"CASC",status:"testing",statusLabel:"Test flights",accent:"var(--coral)",desc:"China's next-generation heavy-lift rocket, intended to carry taikonauts to the Moon and support the planned lunar research station.",milestone:"Long March 10B demonstration flight on the upcoming manifest."}
];
function render(){
  document.getElementById('devGrid').innerHTML=PROGRAMS.map(function(p){
    return '<div class="dev-card" style="--accent:'+p.accent+'"><div class="dev-head"><div class="dev-ico">'+p.ico+'</div><div><div class="dev-name">'+p.name+'</div><div class="dev-org">'+p.org+'</div></div></div><div class="dev-status st-'+p.status+'">'+p.statusLabel+'</div><div class="dev-desc">'+p.desc+'</div><div class="dev-milestone"><b>Next milestone</b>'+p.milestone+'</div></div>';
  }).join('');
}
render();
</script>
<script>
(function(){
  var root=document.documentElement;
  function setTheme(t){root.setAttribute('data-theme',t);var b=document.querySelector('.theme-btn');if(b)b.textContent=t==='light'?'\u2600':'\u263E';}
  window.__toggleTheme=function(){setTheme(root.getAttribute('data-theme')==='light'?'dark':'light');};
  setTheme('dark');
  var page=(location.pathname.split('/').pop()||'index.html');
  var links=[['index.html','Home'],['index-reliability.html','The Index'],['schedule.html','Schedule'],['news.html','News'],['development.html','In Dev'],['games.html','Arcade'],['about.html','About']];
  var nl=links.map(function(l){var a=(l[0]===page)?' class="active"':'';return '<a href="'+l[0]+'"'+a+'>'+l[1]+'</a>';}).join('');
  var h=document.getElementById('site-header');
  if(h)h.outerHTML='<nav class="nav"><div class="nav-inner"><a class="brand" href="index.html">\uD83D\uDE80 <span class="blink"></span> LIVE LAUNCHPAD</a><div class="nav-links">'+nl+'</div><button class="theme-btn" onclick="__toggleTheme()" aria-label="Toggle theme">\u263E</button></div></nav>';
  var f=document.getElementById('site-footer');
  if(f)f.outerHTML='<footer><div class="wrap"><b>LIVE LAUNCHPAD</b> \u2014 mission control for the orbital era.<br>An independent project \u00B7 <a href="about.html">About</a> \u00B7 <a href="index-reliability.html">The Index</a></div></footer>';
  var b=document.querySelector('.theme-btn');if(b)b.textContent='\u263E';
  var c=document.getElementById('stars');if(c){var s='';for(var i=0;i<70;i++){var z=(Math.random()*2+.5).toFixed(1),d=(Math.random()*3+2).toFixed(1),dl=(Math.random()*4).toFixed(1);s+='<div class="star" style="left:'+(Math.random()*100).toFixed(2)+'%;top:'+(Math.random()*100).toFixed(2)+'%;width:'+z+'px;height:'+z+'px;animation-duration:'+d+'s;animation-delay:'+dl+'s"></div>';}c.innerHTML=s;}
})();
</script>
</body>
</html>
